# /etc/tlp.conf - TLP user configuration
# See full explanation: https://linrunner.de/tlp/settings/
# Emphasis: Maximum Battery Life

# --- Audio ---
# Timeout (in seconds) for the audio power saving mode
SOUND_POWER_SAVE_ON_AC=0
SOUND_POWER_SAVE_ON_BAT=1
# Disable controller too
SOUND_POWER_SAVE_CONTROLLER=Y

# --- Disks & Storage ---
DISK_APM_LEVEL_ON_AC="254 254"
DISK_APM_LEVEL_ON_BAT="128 128"
# SATA Aggressive Link Power Management
SATA_LINKPWR_ON_AC="med_power_with_dipm max_performance"
SATA_LINKPWR_ON_BAT="min_power"
# AHCI Link Power Management
AHCI_RUNTIME_PM_ON_AC=on
AHCI_RUNTIME_PM_ON_BAT=auto

# --- CPU & Performance ---
# Select a CPU frequency scaling governor
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=powersave

# Set Intel/AMD energy performance policy
CPU_ENERGY_PERF_POLICY_ON_AC=performance
CPU_ENERGY_PERF_POLICY_ON_BAT=power

# Set platform profile
PLATFORM_PROFILE_ON_AC=performance
PLATFORM_PROFILE_ON_BAT=low-power

# Boost frequency capability
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0

# Hardware latency (powersave schedulers)
SCHED_POWERSAVE_ON_AC=0
SCHED_POWERSAVE_ON_BAT=1

# --- Network ---
# Wi-Fi power saving mode
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# Wake on LAN (disable to save power)
WOL_DISABLE=Y

# --- PCIe Active State Power Management (ASPM) ---
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersupersave

# --- PCI/USB Runtime Power Management ---
RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=auto

# USB Autosuspend
USB_AUTOSUSPEND=1
# Exclude input devices so mouse/keyboard don't lag
USB_EXCLUDE_AUDIO=1
USB_EXCLUDE_BTUSB=0
